type User @table(key: ["username"]) {
  username: String!
  email: String! @unique
  firstName: String!
  lastName: String!
  school: School
  course: Course
  otherSchool: String
  otherCourse: String
  monthlyBudget: Float
  createdAt: Timestamp!
}

type School @table {
  name: String! @unique
}

type Course @table {
  name: String! @unique
}

type Institution @table {
  name: String!
  location: String
}

type Transaction @table {
  user: User!
  category: String!
  amount: Float!
  description: String
  date: Date!
  createdAt: Timestamp!
}

type Scholarship @table {
  title: String!
  description: String
  amount: Float!
  deadline: Date!
}

type ScholarshipApplication @table {
  user: User!
  scholarship: Scholarship!
  status: String!
  appliedAt: Timestamp!
}

type PointsBalance @table {
  user: User!
  totalPoints: Int!
  updatedAt: Timestamp!
}

type PointsTransaction @table {
  user: User!
  amount: Int!
  reason: String!
  createdAt: Timestamp!
}