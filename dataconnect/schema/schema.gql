type User @table(key: ["username"]) {
  username: String!
  email: String! @unique
  firstName: String!
  lastName: String!
  school: School
  course: Course
  otherSchool: String
  otherCourse: String
  monthlyBudget: Float
  createdAt: Timestamp!
}

type School @table {
  name: String! @unique
}

type Course @table {
  name: String! @unique
}

type Institution @table {
  name: String!
  location: String
}

type Transaction @table {
  user: User!
  category: ExpenseCategory!
  amount: Float!
  description: String
  date: Date!
  createdAt: Timestamp!
}

type ExpenseCategory @table {
  name: String! @unique
  iconName: String!
  colorHex: String!
}

type Scholarship @table {
  title: String!
  provider: String!
  location: String!
  amount: Float!
  currency: String! @default(value: "€")
  subjects: String! # Comma-separated strings for matching
  description: String!
  color: String!
  deadline: Date
}

type ScholarshipApplication @table {
  user: User!
  scholarship: Scholarship!
  status: String!
  appliedAt: Timestamp!
}

type PointsBalance @table {
  user: User!
  totalPoints: Int!
  lastBudgetRewardMonth: String
  updatedAt: Timestamp!
}

type PointsTransaction @table {
  user: User!
  amount: Int!
  reason: String!
  createdAt: Timestamp!
}