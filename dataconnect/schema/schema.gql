type User @table {
  username: String! @unique
  email: String! @unique
  createdAt: Timestamp!
}

type Institution @table {
  name: String!
  location: String
}

type BankAccount @table {
  user: User!
  name: String!
  balance: Float!
  createdAt: Timestamp!
}

type Category @table {
  user: User!
  name: String!
  color: String
}

type Transaction @table {
  user: User!
  bankAccount: BankAccount!
  category: Category!
  amount: Float!
  description: String
  date: Date!
  createdAt: Timestamp!
}

type Scholarship @table {
  title: String!
  description: String
  amount: Float!
  deadline: Date!
}

type ScholarshipApplication @table {
  user: User!
  scholarship: Scholarship!
  status: String!
  appliedAt: Timestamp!
}

type PointsBalance @table {
  user: User!
  totalPoints: Int!
  updatedAt: Timestamp!
}

type PointsTransaction @table {
  user: User!
  amount: Int!
  reason: String!
  createdAt: Timestamp!
}