# List institutions
query ListInstitutions @auth(level: PUBLIC) {
  institutions(orderBy: [{name: ASC}]) {
    id
    name
  }
}

# List courses
query ListCourses @auth(level: PUBLIC) {
  courses(orderBy: [{name: ASC}]) {
    id
    name
  }
}

# List transactions for a user
query ListUserTransactions($userId: String!) @auth(level: USER) {
  transactions(
    where: {userUserId: {eq: $userId}}
    orderBy: [{date: DESC}, {createdAt: DESC}]
    limit: 1000
  ) {
    id
    amount
    description
    date
    category {
      id
      name
      iconName
      colorHex
    }
  }
}

# Get user's total points balance
query GetUserPoints($userId: String!) @auth(level: USER) {
  pointsBalances(where: {userUserId: {eq: $userId}}) {
    id
    totalPoints
    updatedAt
  }
}

# List redeemable products
query ListProducts @auth(level: PUBLIC) {
  products(where: {active: {eq: true}}, orderBy: [{cost: ASC}, {name: ASC}]) {
    id
    name
    description
    storeName
    cost
    active
  }
}

# List products redeemed by the user
query ListRedeemedProducts($userId: String!) @auth(level: USER) {
  redeemedProducts(
    where: {userUserId: {eq: $userId}}
    orderBy: [{redeemedAt: DESC}]
  ) {
    code
    redeemedAt
    product {
      id
      name
      description
      storeName
      cost
      active
    }
  }
}

# Add new transaction
mutation AddTransaction(
  $userId: String!,
  $categoryId: UUID!,
  $amount: Float!,
  $description: String,
  $date: Date!
) @auth(level: USER) {
  transaction_insert(data: {
    userUserId: $userId,
    categoryId: $categoryId,
    amount: $amount,
    description: $description,
    date: $date,
    createdAt_expr: "request.time"
  })
}

# Create or update user profile
mutation StoreUserProfile(
  $userId: String!,
  $email: String!,
  $firstName: String!,
  $lastName: String!,
  $institutionId: UUID,
  $courseId: UUID,
  $otherInstitution: String,
  $otherCourse: String,
  $budget: Float,
  $countryId: Int,
  $currencyId: Int,
  $isWeekly: Boolean,
  $prefix: String,
  $phoneNumber: String
) @auth(level: USER) {
  user_upsert(data: {
    userId: $userId,
    email: $email,
    firstName: $firstName,
    lastName: $lastName,
    institutionId: $institutionId,
    courseId: $courseId,
    otherInstitution: $otherInstitution,
    otherCourse: $otherCourse,
    budget: $budget,
    countryId: $countryId,
    currencyId: $currencyId,
    isWeekly: $isWeekly,
    prefix: $prefix,
    phoneNumber: $phoneNumber,
    createdAt_expr: "request.time"
  })
}

# List currencies for onboarding dropdown
query ListCurrencies @auth(level: PUBLIC) {
  currencies(orderBy: [{code: ASC}]) {
    id
    code
    sign
  }
}

# Look up a country's numeric id from its code
query GetCountryIdByCode($code: String!) @auth(level: USER) {
  countries(where: {countryCode: {eq: $code}}, limit: 1) {
    id
    countryCode
    name
  }
}

# Delete transaction
mutation DeleteTransaction($id: UUID!) @auth(level: USER) {
  transaction_delete(key: {id: $id})
}

# Update transaction
mutation UpdateTransaction(
  $id: UUID!,
  $categoryId: UUID!,
  $amount: Float!,
  $description: String,
  $date: Date!
) @auth(level: USER) {
  transaction_update(
    key: {id: $id}
    data: {
      categoryId: $categoryId
      amount: $amount
      description: $description
      date: $date
    }
  )
}

# Delete user profile
mutation DeleteUserProfile($userId: String!) @auth(level: USER) {
  user_delete(key: {userId: $userId})
}

# Update user budget (amount and period)
mutation UpdateUserBudget(
  $userId: String!,
  $budget: Float!,
  $isWeekly: Boolean
) @auth(level: USER) {
  user_update(
    key: {userId: $userId},
    data: {
      budget: $budget,
      isWeekly: $isWeekly
    }
  )
}

# Get user profile info
query GetUserProfile($userId: String!) @auth(level: USER) {
  users(where: {userId: {eq: $userId}}) {
    firstName
    lastName
    budget
    isWeekly
    otherInstitution
    otherCourse
    institution {
      name
    }
    course {
      id
      name
    }
    currency {
      id
      code
      sign
    }
    country {
      id
      countryCode
      name
    }
  }
}

query GetContinentsForCountry($countryId: Int!) @auth(level: USER) {
  countryContinents(where: { countryId: { eq: $countryId } }) {
    continent {
      id
      code
      name
    }
  }
}

# Update the user's preferred currency
mutation UpdateUserCurrency(
  $userId: String!,
  $currencyId: Int!
) @auth(level: USER) {
  user_update(
    key: {userId: $userId},
    data: {
      currencyId: $currencyId
    }
  )
}

# List scholarships for a user
query ListScholarshipsForUser($countryId: Int!, $continentId: Int!) @auth(level: USER) {
  scholarships(
    where: {
      _or: [
        {
          _and: [{ countryId: { isNull: true } }, { continentId: { isNull: true } }]
        }
        { countryId: { eq: $countryId } }
        {
          _and: [{ countryId: { isNull: true } }, { continentId: { eq: $continentId } }]
        }
      ]
    }
    orderBy: [{ amount: DESC }]
  ) {
    id
    title
    provider
    email
    amount
    currency
    courses_via_ScholarshipCourse {
      id
      name
    }
    description
    color
    country {
      id
      countryCode
      name
    }
    continent {
      id
      code
      name
    }
  }
}

query ListGlobalScholarships @auth(level: USER) {
  scholarships(
    where: {
      _and: [{ countryId: { isNull: true } }, { continentId: { isNull: true } }]
    }
    orderBy: [{ amount: DESC }]
  ) {
    id
    title
    provider
    email
    amount
    currency
    courses_via_ScholarshipCourse {
      id
      name
    }
    description
    color
    country {
      id
      countryCode
      name
    }
    continent {
      id
      code
      name
    }
  }
}

# List expense categories
query ListExpenseCategories @auth(level: PUBLIC) {
  expenseCategories {
    id
    name
    iconName
    colorHex
  }
}

# Initialise points balance for new user
mutation InitPointsBalance(
  $userId: String!,
  $totalPoints: Int!
) @auth(level: USER) {
  pointsBalance_insert(data: {
    userUserId: $userId,
    totalPoints: $totalPoints,
    updatedAt_expr: "request.time"
  })
}

# Update existing points balance by ID
mutation UpdatePointsBalance(
  $id: UUID!,
  $totalPoints: Int!
) @auth(level: USER) {
  pointsBalance_update(key: {id: $id}, data: {
    totalPoints: $totalPoints,
    updatedAt_expr: "request.time"
  })
}

# Get login lock status for a user by email
query GetLoginStatus($email: String!) @auth(level: PUBLIC) {
  users(where: {email: {eq: $email}}) {
    userId
    failedAttempts
    lockedUntil
  }
}

# Record a failed login attempt
mutation RecordFailedLogin($userId: String!, $failedAttempts: Int!, $lockedUntil: Timestamp) @auth(level: PUBLIC) {
  user_update(
    key: {userId: $userId},
    data: {
      failedAttempts: $failedAttempts,
      lockedUntil: $lockedUntil
    }
  )
}

# Reset login attempts on successful login
mutation ResetLoginAttempts($userId: String!) @auth(level: PUBLIC) {
  user_update(
    key: {userId: $userId},
    data: {
      failedAttempts: 0
    }
  )
}

# Per-category budget caps for the signed-in user (Firebase `userId` matches `User.userId`)
query ListUserCategoryBudgets($userId: String!) @auth(level: USER) {
  categoryBudgets(where: {userUserId: {eq: $userId}}) {
    budgetAmount
    category {
      id
      name
      iconName
      colorHex
    }
  }
}

mutation UpsertCategoryBudget(
  $userId: String!,
  $categoryId: UUID!,
  $budgetAmount: Int!
) @auth(level: USER) {
  categoryBudget_upsert(
    data: {
      userUserId: $userId,
      categoryId: $categoryId,
      budgetAmount: $budgetAmount
    }
  )
}

mutation DeleteCategoryBudget($userId: String!, $categoryId: UUID!) @auth(level: USER) {
  categoryBudget_delete(key: {userUserId: $userId, categoryId: $categoryId})
}
