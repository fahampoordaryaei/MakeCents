# Look up country by ISO code
query GetCountryByCode($countryCode: String!) @auth(level: PUBLIC) {
  countries(where: {countryCode: {eq: $countryCode}}, limit: 1) {
    id
    countryCode
    continentCode
  }
}

# List institutions
query ListInstitutions @auth(level: PUBLIC) {
  institutions(orderBy: [{name: ASC}]) {
    id
    name
  }
}

# List courses
query ListCourses @auth(level: PUBLIC) {
  courses(orderBy: [{name: ASC}]) {
    id
    name
  }
}

# List transactions for a user
query ListUserTransactions($userId: String!) @auth(level: USER) {
  transactions(
    where: {userUsername: {eq: $userId}}
    orderBy: [{date: DESC}, {createdAt: DESC}]
    limit: 1000
  ) {
    id
    amount
    description
    date
    category {
      id
      name
      iconName
      colorHex
    }
  }
}

# Get user's total points balance
query GetUserPoints($userId: String!) @auth(level: USER) {
  pointsBalances(where: {userUsername: {eq: $userId}}) {
    id
    totalPoints
    updatedAt
  }
}

# List redeemable products
query ListProducts @auth(level: PUBLIC) {
  products(where: {active: {eq: true}}, orderBy: [{cost: ASC}, {name: ASC}]) {
    id
    name
    description
    storeName
    cost
    active
  }
}

# List products redeemed by the user
query ListRedeemedProducts($userId: String!) @auth(level: USER) {
  redeemedProducts(
    where: {userUsername: {eq: $userId}}
    orderBy: [{redeemedAt: DESC}]
  ) {
    code
    redeemedAt
    product {
      id
      name
      description
      storeName
      cost
      active
    }
  }
}

# Add new transaction
mutation AddTransaction(
  $userId: String!,
  $categoryId: UUID!,
  $amount: Float!,
  $description: String,
  $date: Date!
) @auth(level: USER) {
  transaction_insert(data: {
    userUsername: $userId,
    categoryId: $categoryId,
    amount: $amount,
    description: $description,
    date: $date,
    createdAt_expr: "request.time"
  })
}

# Create or update user profile
mutation StoreUserProfile(
  $username: String!,
  $email: String!,
  $firstName: String!,
  $lastName: String!,
  $institutionId: UUID,
  $courseId: UUID,
  $otherSchool: String,
  $otherCourse: String,
  $monthlyBudget: Float,
  $countryId: UUID
) @auth(level: USER) {
  user_upsert(data: {
    username: $username,
    email: $email,
    firstName: $firstName,
    lastName: $lastName,
    institutionId: $institutionId,
    courseId: $courseId,
    otherSchool: $otherSchool,
    otherCourse: $otherCourse,
    monthlyBudget: $monthlyBudget,
    countryId: $countryId,
    createdAt_expr: "request.time"
  })
}

# Delete transaction
mutation DeleteTransaction($id: UUID!) @auth(level: USER) {
  transaction_delete(key: {id: $id})
}

# Update transaction
mutation UpdateTransaction(
  $id: UUID!,
  $categoryId: UUID!,
  $amount: Float!,
  $description: String,
  $date: Date!
) @auth(level: USER) {
  transaction_update(
    key: {id: $id}
    data: {
      categoryId: $categoryId
      amount: $amount
      description: $description
      date: $date
    }
  )
}

# Delete user profile
mutation DeleteUserProfile($username: String!) @auth(level: USER) {
  user_delete(key: {username: $username})
}

# Update user budget
mutation UpdateUserBudget($username: String!, $budget: Float!) @auth(level: USER) {
  user_update(key: {username: $username}, data: {monthlyBudget: $budget})
}

# Get user profile info
query GetUserProfile($username: String!) @auth(level: USER) {
  users(where: {username: {eq: $username}}) {
    firstName
    lastName
    monthlyBudget
    otherSchool
    otherCourse
    institution {
      name
    }
    course {
      id
      name
    }
    country {
      id
      countryCode
      continentCode
    }
  }
}

# List scholarships
query ListScholarships @auth(level: PUBLIC) {
  scholarships(orderBy: [{amount: DESC}]) {
    id
    title
    provider
    email
    amount
    currency
    courses_via_ScholarshipCourse {
      id
      name
    }
    description
    color
  }
}

# List expense categories
query ListExpenseCategories @auth(level: PUBLIC) {
  expenseCategories {
    id
    name
    iconName
    colorHex
  }
}

# Initialise points balance for new user
mutation InitPointsBalance(
  $userId: String!,
  $totalPoints: Int!
) @auth(level: USER) {
  pointsBalance_insert(data: {
    userUsername: $userId,
    totalPoints: $totalPoints,
    updatedAt_expr: "request.time"
  })
}

# Update existing points balance by ID
mutation UpdatePointsBalance(
  $id: UUID!,
  $totalPoints: Int!
) @auth(level: USER) {
  pointsBalance_update(key: {id: $id}, data: {
    totalPoints: $totalPoints,
    updatedAt_expr: "request.time"
  })
}

# Get login lock status for a user by email
query GetLoginStatus($email: String!) @auth(level: PUBLIC) {
  users(where: {email: {eq: $email}}) {
    username
    failedAttempts
    lockedUntil
  }
}

# Record a failed login attempt
mutation RecordFailedLogin($username: String!, $failedAttempts: Int!, $lockedUntil: Timestamp) @auth(level: PUBLIC) {
  user_update(
    key: {username: $username},
    data: {
      failedAttempts: $failedAttempts,
      lockedUntil: $lockedUntil
    }
  )
}

# Reset login attempts on successful login
mutation ResetLoginAttempts($username: String!) @auth(level: PUBLIC) {
  user_update(
    key: {username: $username},
    data: {
      failedAttempts: 0
    }
  )
}
